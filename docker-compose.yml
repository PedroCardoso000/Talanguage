services:
  db:
    image: postgres:16-alpine
    container_name: tala-db
    environment:
      POSTGRES_DB: talanguage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d talanguage"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: tala-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: talanguage
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    container_name: tala-web
    depends_on:
      - api
    ports:
      - "3000:3000"
